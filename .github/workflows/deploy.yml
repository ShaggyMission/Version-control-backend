name: CI/CD
 
on:
  push:
    branches:
      - qa
      - main
    tags:
      - 'v*'
 
jobs:
 
  # QA PIPELINE (VERCEL)
 
  test-qa:
    name: QA Quality Checks
    if: github.ref == 'refs/heads/qa'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Setup Node + Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
 
      - name: Install dependencies
        run: npm ci
 
      - name: Security Audit
        run: npm audit --audit-level=high
 
      - name: Run Tests
        run: npm test
 
      - name: Coverage
        run: npm run test:coverage

 
  deploy-qa:
    name: Deploy QA Vercel
    if: github.ref == 'refs/heads/qa'
    needs: test-qa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Install Vercel CLI
        run: npm install -g vercel
 
      - name: Vercel Pull
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_QA }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_QA }}
 
      - name: Vercel Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_QA }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_QA }}
 
      - name: Vercel Deploy
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_QA }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_QA }}
 
  # PROD PIPELINE (AZURE VM)
 
  test-prod:
    name: Production Quality Checks
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Setup Node + Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
 
      - name: Install dependencies
        run: npm ci
 
      - name: Security Audit
        run: npm audit --audit-level=high
 
      - name: Run Tests
        run: npm test
 
      - name: Coverage
        run: npm run test:coverage
 
      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push:
    name: Build and Push Docker Image
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test-prod
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
 
      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      - name: Build Docker image
        run: |
          docker build . \
            --file Dockerfile \
            --tag shaggymission/version-control-web:${VERSION}
 
      - name: Push Docker image
        run: |
          docker push shaggymission/version-control-web:${VERSION}
 
  deploy-prod:
    name: Deploy Production Azure VM
    if: startsWith(github.ref, 'refs/tags/main')
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          envs: VERSION
          script: |
            echo "Deploying version $VERSION"

            sudo docker --version || sudo apt install -y docker.io
            sudo service docker start || true
            docker pull shaggymission/version-control-web:$VERSION
            docker stop apitopics || true
            docker rm apitopics || true
            docker run -d \
              --name apitopics \
              -p 3001:3001 \
              shaggymission/version-control-web:$VERSION

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: deploy-prod
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}