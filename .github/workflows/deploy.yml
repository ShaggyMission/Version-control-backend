name: CI/CD Railway Multi Env

on:
  push:
    branches:
      - qa
      - main

  pull_request:
    branches:
      - main

jobs:

  # TESTS — corre en push a qa/main y en PRs a main
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

  # DEPLOY QA — solo cuando hay push a la rama qa
  deploy-qa:
    if: github.ref == 'refs/heads/qa' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy QA
        run: railway up --service version-control-web-qa
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_QA }}

  # DEPLOY PROD — solo cuando se mergea un PR a main (push a main)
  deploy-prod:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}