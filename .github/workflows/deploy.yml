name: CI/CD

on:
  push:
    branches:
      - qa
      - main
    tags:
      - 'v*'

jobs:

  # QA PIPELINE
  test-qa:
    name: Test QA
    if: github.ref == 'refs/heads/qa'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install
      - run: npm test

  deploy-qa:
    name: Deploy QA Vercel
    if: github.ref == 'refs/heads/qa'
    needs: test-qa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: npm install -g vercel

      - run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_QA }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_QA }}

      - run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_QA }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_QA }}

      - run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_QA }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_QA }}

  # PROD PIPELINE
  test-prod:
    name: Test Production
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install
      - run: npm test

  build-and-push:
    name: Build and Push Docker Image
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test-prod
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get tag version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build . \
            --file Dockerfile \
            --tag shaggymission/version-control-web:${VERSION}

      - name: Push Docker image
        run: |
          docker push shaggymission/version-control-web:${VERSION}

  deploy-prod:
    name: Deploy Production Vercel
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: npm install -g vercel

      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}