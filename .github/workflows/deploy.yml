name: CI/CD GitOps

on:
  push:
    branches:
      - qa
    tags:
      - 'v*'

jobs:

  #################################################
  # QA PIPELINE
  #################################################

  test-qa:
    name: Test QA
    if: github.ref == 'refs/heads/qa'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  deploy-qa:
    name: Deploy QA Vercel
    if: github.ref == 'refs/heads/qa'
    needs: test-qa
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel env
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_QA }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_QA }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_QA }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_QA }}

      - name: Deploy QA
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_QA }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_QA }}

  #################################################
  # PRODUCTION PIPELINE
  #################################################

  test-prod:
    name: Test Production
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  build-and-push:
    name: Build and Push Docker
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test-prod
    runs-on: ubuntu-latest

    outputs:
      version_tag: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build . \
            --file Dockerfile \
            --tag shaggymission/version-control-web:${{ steps.version.outputs.version }}

      - name: Push image
        run: |
          docker push shaggymission/version-control-web:${{ steps.version.outputs.version }}

  #################################################
  # UPDATE GITOPS REPO
  #################################################

  update-gitops:
    name: Update GitOps Repository
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Clone GitOps repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/shaggymission/gitops-infra.git

      - name: Update image version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          cd gitops-infra

          sed -i "s|image: .*|image: shaggymission/version-control-web:${VERSION}|g" \
            apps/version-control-web/deployment.yaml

      - name: Commit and push
        run: |
          cd gitops-infra

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git commit -m "Deploy ${GITHUB_REF#refs/tags/}" || echo "No changes"

          git push