name: CI/CD Railway

on:
  push:
    branches:
      - qa
      - main

jobs:

  # QA
  test-qa:
    if: github.ref == 'refs/heads/qa'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  deploy-qa:
    if: github.ref == 'refs/heads/qa'
    needs: test-qa
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy QA to Railway
        run: railway up --service version-control-web-qa
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_QA }}

  # PRODUCTION
# PRODUCTION
test-prod:
  if: github.ref == 'refs/heads/main'
  runs-on: ubuntu-latest

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test


build-and-push:
  if: github.ref == 'refs/heads/main'
  name: Build and Push Docker Image
  runs-on: ubuntu-latest
  needs: test-prod

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: shaggymission
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Generate version tag
      run: |
        VERSION_TAG=v$(date +'%Y%m%d%H%M%S')
        echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV

    - name: Build Docker image
      run: |
        docker build . \
        --file Dockerfile \
        --tag shaggymission/version-control-web:${VERSION_TAG} \
        --tag shaggymission/version-control-web:latest

    - name: Push Docker image
      run: |
        docker push shaggymission/version-control-web:${VERSION_TAG}
        docker push shaggymission/version-control-web:latest


deploy-prod:
  if: github.ref == 'refs/heads/main'
  needs: build-and-push
  runs-on: ubuntu-latest

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Railway CLI
      run: npm install -g @railway/cli

    - name: Deploy PROD to Railway
      run: railway up --service version-control-web-prod
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}